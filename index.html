<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сканер ТСД</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1c1c1e;
            color: white;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .btn {
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 18px 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 80%;
            max-width: 300px;
            box-shadow: 0 4px 15px rgba(0,122,255,0.3);
        }
        .status {
            margin-top: 20px;
            color: #9a9a9f;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <button class="btn" id="scan-btn">Включить супер-сканер 📷</button>
    <div class="status" id="status">Инициализация...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const scanBtn = document.getElementById('scan-btn');
        const statusDiv = document.getElementById('status');

        // Функция вызова встроенного системного сканера Telegram
        function openTelegramScanner() {
            statusDiv.innerText = "Открытие системной камеры...";
            
            tg.showScanQrPopup({
                text: "Наведите камеру на любой штрих-код или QR-код товара"
            }, function(text) {
                // Этот коллбек срабатывает мгновенно, как только камера Telegram поймает штрихкод
                statusDiv.innerText = "Код считан: " + text;
                
                // Отправляем код в бота
                tg.sendData(JSON.stringify({ barcode: text }));
                
                // Закрываем приложение
                tg.close();
                return true; // Закрывает всплывающее окно сканера внутри ТГ
            });
        }

        // Автозапуск при открытии страницы, чтобы сотруднику не делать лишних кликов
        document.addEventListener("DOMContentLoaded", function() {
            statusDiv.innerText = "Готов к сканированию";
            openTelegramScanner();
        });

        // На случай если окно закрыли, его можно вызвать по кнопке
        scanBtn.addEventListener('click', openTelegramScanner);
    </script>
</body>
</html>
