<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сканер ТСД</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1c1c1e;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        h2 { 
            margin-top: 20px;
            font-size: 20px;
            font-weight: 600;
        }
        #reader-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        #reader {
            width: 92%;
            max-width: 450px;
            aspect-ratio: 4 / 3;
            border-radius: 16px;
            overflow: hidden;
            background-color: #000;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        #reader video {
            object-fit: cover !important;
        }
        #reader__scan_region {
            background: rgba(255, 255, 255, 0.02);
        }
        .panel { 
            padding: 20px;
            background: #2c2c2e; 
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.3);
        }
        .btn {
            background-color: #007aff;
            color: white; 
            border: none;
            border-radius: 12px; 
            padding: 16px; 
            font-size: 16px;
            font-weight: 600; 
            width: 100%; 
            max-width: 300px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0,122,255,0.3);
        }
        .status {
            margin-bottom: 12px;
            color: #9a9a9f; 
            font-size: 15px;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
        }
        .btn-secondary {
            background-color: #3a3a3c;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            flex: 1;
            cursor: pointer;
        }
        .btn-secondary.active {
            background-color: #ffb300;
            color: #1c1c1e;
        }
        #manual-entry {
            display: none;
            margin-top: 12px;
            gap: 8px;
        }
        #manual-entry.visible {
            display: flex;
        }
        #manual-input {
            flex: 1;
            border-radius: 10px;
            border: none;
            padding: 12px;
            font-size: 16px;
            background: #1c1c1e;
            color: white;
        }
        #manual-send {
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0 16px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <h2>Сканирование товара</h2>
    
    <div id="reader-container">
        <div id="reader"></div>
    </div>
    
    <div class="panel">
        <div id="status" class="status">Нажмите кнопку для запуска</div>
        <button class="btn" id="action-btn">Включить камеру 📷</button>

        <div class="btn-row" id="extra-controls" style="display:none; margin-top:10px;">
            <button class="btn-secondary" id="torch-btn" style="display:none;">🔦 Фонарь</button>
            <button class="btn-secondary" id="manual-toggle-btn">⌨️ Ввести код вручную</button>
        </div>

        <div id="manual-entry">
            <input type="text" id="manual-input" inputmode="numeric" placeholder="Штрихкод цифрами">
            <button id="manual-send">ОК</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const btn = document.getElementById('action-btn');
        const statusDiv = document.getElementById('status');
        const extraControls = document.getElementById('extra-controls');
        const torchBtn = document.getElementById('torch-btn');
        const manualToggleBtn = document.getElementById('manual-toggle-btn');
        const manualEntry = document.getElementById('manual-entry');
        const manualInput = document.getElementById('manual-input');
        const manualSend = document.getElementById('manual-send');

        let scanner = null;
        let torchFeature = null;
        let torchOn = false;
        let closing = false;

        function sendBarcodeAndClose(text) {
            if (closing) return;
            closing = true;
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }
            statusDiv.innerText = "Код успешно считан!";
            tg.sendData(JSON.stringify({ barcode: text }));

            if (scanner) {
                scanner.stop().then(() => tg.close()).catch(() => tg.close());
            } else {
                tg.close();
            }
        }

        async function setupTorchButton() {
            try {
                const capabilities = scanner.getRunningTrackCameraCapabilities();
                torchFeature = capabilities.torchFeature();
                if (torchFeature && torchFeature.isSupported()) {
                    torchBtn.style.display = 'inline-block';
                } else {
                    torchBtn.style.display = 'none';
                }
            } catch (e) {
                torchFeature = null;
                torchBtn.style.display = 'none';
            }
        }

        torchBtn.addEventListener('click', async () => {
            if (!torchFeature) return;
            try {
                await torchFeature.apply(!torchOn);
                torchOn = !torchOn;
                torchBtn.classList.toggle('active', torchOn);
                torchBtn.innerText = torchOn ? '🔦 Выключить' : '🔦 Фонарь';
            } catch (e) {
                console.error("Не удалось переключить фонарь:", e);
            }
        });

        manualToggleBtn.addEventListener('click', () => {
            manualEntry.classList.toggle('visible');
            if (manualEntry.classList.contains('visible')) {
                manualInput.focus();
            }
        });

        manualSend.addEventListener('click', () => {
            const value = manualInput.value.trim();
            if (!value) return;
            sendBarcodeAndClose(value);
        });

        manualInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') manualSend.click();
        });

        btn.addEventListener('click', async () => {
            btn.style.display = 'none';
            statusDiv.innerText = "Запуск камеры...";
            
            if (scanner) {
                try { await scanner.clear(); } catch (e) {}
            }
         
            scanner = new Html5Qrcode("reader", {
                formatsToSupport: [
                    Html5QrcodeSupportedFormats.EAN_13,
                    Html5QrcodeSupportedFormats.EAN_8,
                    Html5QrcodeSupportedFormats.UPC_A,
                    Html5QrcodeSupportedFormats.UPC_E,
                    Html5QrcodeSupportedFormats.CODE_128,
                    Html5QrcodeSupportedFormats.CODE_39,
                    Html5QrcodeSupportedFormats.ITF
                ],
                verbose: false
            });

            // Конфигурация сканирования: оптимальный FPS для экспозиции кадра
            const config = { 
                fps: 15, 
                qrbox: { width: 310, height: 150 }, 
                experimentalFeatures: { useBarCodeDetectorIfSupported: true }
            };

            // 1. ЗАПУСК КАМЕРЫ: Используем максимально простой и бесконфликтный режим.
            // Это гарантирует, что iPhone мгновенно откроет видеопоток БЕЗ зависаний.
            scanner.start(
                { facingMode: "environment" },
                config,
                (text) => { sendBarcodeAndClose(text); },
                (err) => { }
            ).then(async () => {
                statusDiv.innerText = "Поместите штрих-код в рамку прицела";
                extraControls.style.display = 'flex';
                setupTorchButton();

                // 2. ДИНАМИЧЕСКИЙ ТЮНИНГ ОПТИКИ ПОД IPHONE (HD-поток + Зум + Автофокус)
                // Камера уже запущена, теперь мы аккуратно применяем параметры к активному треку.
                try {
                    const track = scanner.getRunningTrack();
                    if (track) {
                        const constraints = {
                            width: { ideal: 1280 },
                            height: { ideal: 720 },
                            advanced: [
                                { focusMode: "continuous" }, // Постоянный фокус
                                { zoom: 1.5 }               // Зум 1.5х для исключения размытия вблизи
                            ]
                        };
                        
                        // Применяем настройки потока «на лету»
                        if (typeof track.applyConstraints === 'function') {
                            await track.applyConstraints(constraints);
                            console.log("HD-разрешение и Zoom 1.5 успешно применены к треку iPhone!");
                        }
                    }
                } catch (trackErr) {
                    // Если конкретная старая модель iOS не поддерживает зум на лету, она просто пропустит этот шаг
                    console.warn("Не удалось динамически настроить трек оптики:", trackErr);
                }

            }).catch(err => {
                statusDiv.innerText = "Ошибка доступа. Проверьте разрешения камеры.";
                btn.style.display = 'inline-block';
                extraControls.style.display = 'flex';
                torchBtn.style.display = 'none';
                console.error("Критическая ошибка старта:", err);
            });
        });

        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => { btn.click(); }, 150);
        });
    </script>
</body>
</html>
