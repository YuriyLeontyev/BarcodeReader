<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сканер ТСД Мульти</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1c1c1e;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        h2 { margin-top: 15px; font-size: 18px; font-weight: 600; margin-bottom: 5px;}
        #reader-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        #reader {
            width: 92%;
            max-width: 450px;
            aspect-ratio: 4 / 3;
            border-radius: 16px;
            overflow: hidden;
            background-color: #000;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        #reader video { object-fit: cover !important; }
        
        .panel { 
            padding: 15px; 
            background: #2c2c2e; 
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }
        .status { margin-bottom: 10px; color: #9a9a9f; font-size: 14px; }
        .scanned-count {
            font-size: 20px; font-weight: bold; color: #34c759; margin-bottom: 10px;
        }
        .btn {
            color: white; border: none; border-radius: 12px; 
            padding: 14px; font-size: 16px; font-weight: 600; 
            width: 46%; margin: 2%; cursor: pointer; display: inline-block;
        }
        .btn-send { background-color: #34c759; box-shadow: 0 4px 12px rgba(52,199,89,0.3); width: 94%; }
        .btn-torch { background-color: #ff9500; box-shadow: 0 4px 12px rgba(255,149,0,0.3); }
        .btn-start { background-color: #007aff; width: 94%; }
        
        #log { font-size: 13px; color: #aeaeac; max-height: 45px; overflow-y: auto; margin-top: 5px; padding: 0 15px; text-align: left; }
    </style>
</head>
<body>

    <h2>Непрерывное сканирование</h2>
    <div class="scanned-count">Считано штрихкодов: <span id="count">0</span></div>
    
    <div id="reader-container">
        <div id="reader"></div>
    </div>
    
    <div id="log"></div>
    
    <div class="panel">
        <div id="status" class="status">Ожидание запуска камеры...</div>
        
        <button class="btn btn-start" id="start-btn">Включить камеру 📷</button>
        
        <div id="controls" style="display: none; width: 100%;">
            <button class="btn btn-torch" id="torch-btn">Фонарик: ВЫКЛ 🔦</button>
            <button class="btn btn-send" id="send-btn">Передать данные в бот ✅</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const startBtn = document.getElementById('start-btn');
        const torchBtn = document.getElementById('torch-btn');
        const sendBtn = document.getElementById('send-btn');
        const controls = document.getElementById('controls');
        const statusDiv = document.getElementById('status');
        const countSpan = document.getElementById('count');
        const logDiv = document.getElementById('log');

        let scanner = null;
        let scannedBarcodes = []; 
        let isTorchOn = false;
        let lastScannedCode = "";
        let lastScannedTime = 0;

        const onScanSuccess = (text) => {
            const now = Date.now();
            if (text === lastScannedCode && (now - lastScannedTime) < 1500) {
                return; 
            }
            
            lastScannedCode = text;
            lastScannedTime = now;

            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }
            
            scannedBarcodes.push(text);
            countSpan.innerText = scannedBarcodes.length;
            statusDiv.innerText = `Добавлен код: ${text}`;
            
            const p = document.createElement('div');
            p.innerText = `✓ ${text}`;
            logDiv.appendChild(p);
            logDiv.scrollTop = logDiv.scrollHeight;
        };

        startBtn.addEventListener('click', async () => {
            startBtn.style.display = 'none';
            controls.style.display = 'block';
            statusDiv.innerText = "Инициализация HD-оптики...";
            
            if (scanner) {
                try { await scanner.clear(); } catch (e) {}
            }
            
            // Инициализируем только с нужными линейными форматами ТСД
            scanner = new Html5Qrcode("reader", {
                formatsToSupport: [ 
                    Html5QrcodeSupportedFormats.EAN_13,
                    Html5QrcodeSupportedFormats.EAN_8,
                    Html5QrcodeSupportedFormats.CODE_128 
                ],
                verbose: false
            });
            
            // Оптимальный конфиг движка распознавания
            const config = { 
                fps: 15, // 15 fps дает камере iPhone больше времени на экспозицию кадров при слабом свете
                qrbox: { width: 300, height: 140 }, // Оптимизированный прямоугольник ТСД
                experimentalFeatures: { useBarCodeDetectorIfSupported: true }
            };

            // КЛЮЧЕВОЙ МОМЕНТ ДЛЯ IPHONE: Настройка видеопотока через MediaTrackConstraints
            // Запрашиваем HD разрешение и активируем программное сближение (зум), 
            // чтобы фокус ловил код с расстояния вытянутой руки, не размывая картинку в макро-режиме.
            const iosOptimizedConstraints = {
                facingMode: "environment",
                width: { min: 1280, ideal: 1280 }, // Жестко просим HD качество (не 640x480)
                height: { min: 720, ideal: 720 },
                advanced: [
                    { focusMode: "continuous" }, // Непрерывный автофокус
                    { zoom: 1.5 }                // Легкий зум. Помогает iPhone сфокусироваться на коде без размытия макросъемки
                ]
            };

            scanner.start(
                iosOptimizedConstraints,
                config,
                onScanSuccess,
                (err) => { }
            ).then(() => {
                statusDiv.innerText = "Наводите прицел на штрихкод товара";
            }).catch(e => {
                console.warn("HD режим отклонен Safari. Переход на базовый поток...", e);
                
                // Фолбек-вариант, если iOS совсем старая и не приняла жесткие ограничения
                scanner.start(
                    { facingMode: "environment" },
                    config,
                    onScanSuccess,
                    (err) => {}
                ).then(() => {
                    statusDiv.innerText = "Наводите прицел (базовый режим)";
                }).catch(err2 => {
                    statusDiv.innerText = "Ошибка доступа. Проверьте разрешения камеры в настройках iPhone.";
                    startBtn.style.display = 'inline-block';
                    controls.style.display = 'none';
                });
            });
        });

        // Исправленное управление фонариком для iOS/Android
        torchBtn.addEventListener('click', async () => {
            if (!scanner) return;
            try {
                const track = scanner.getRunningTrack();
                if (track && typeof track.getCapabilities === 'function') {
                    const capabilities = track.getCapabilities();
                    if (capabilities.torch) {
                        isTorchOn = !isTorchOn;
                        await track.applyConstraints({
                            advanced: [{ torch: isTorchOn }]
                        });
                        torchBtn.innerText = isTorchOn ? "Фонарик: ВКЛ ☀️" : "Фонарик: ВЫКЛ 🔦";
                        torchBtn.style.backgroundColor = isTorchOn ? "#34c759" : "#ff9500";
                    } else {
                        statusDiv.innerText = "Вспышка заблокирована iOS (Ограничение Safari)";
                    }
                } else {
                    statusDiv.innerText = "Фонарик недоступен (камера не активна)";
                }
            } catch (err) {
                console.error("Ошибка активации фонарика:", err);
            }
        });

        sendBtn.addEventListener('click', async () => {
            if (scannedBarcodes.length === 0) {
                statusDiv.innerText = "❌ Список пуст. Отсканируйте товары!";
                return;
            }
            
            statusDiv.innerText = "Передача данных...";
            tg.sendData(JSON.stringify({ barcodes: scannedBarcodes }));
            
            if (scanner) {
                scanner.stop().then(() => {
                    tg.close();
                }).catch(() => { tg.close(); });
            } else {
                tg.close();
            }
        });

        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => { startBtn.click(); }, 250);
        });
    </script>
</body>
</html>
