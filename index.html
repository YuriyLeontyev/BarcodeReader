<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сканер ТСД</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1c1c1e;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        h2 { margin-top: 15px; font-size: 18px; }
        #reader-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        #reader {
            width: 92%;
            max-width: 450px;
            aspect-ratio: 4 / 3;
            border-radius: 16px;
            overflow: hidden;
            background-color: #000;
        }
        .panel { padding: 15px; background: #2c2c2e; }
        .btn {
            background-color: #007aff; color: white; border: none;
            border-radius: 12px; padding: 15px; font-size: 16px;
            font-weight: 600; width: 100%; max-width: 300px;
        }
    </style>
</head>
<body>
    <h2>Сканирование товара</h2>
    <div id="reader-container"><div id="reader"></div></div>
    <div class="panel">
        <div id="status" style="margin-bottom: 10px; color: #9a9a9f;">Нажмите для старта</div>
        <button class="btn" id="action-btn">Включить камеру 📷</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const btn = document.getElementById('action-btn');
        const status = document.getElementById('status');
        let scanner = null;

        btn.addEventListener('click', () => {
            btn.style.display = 'none';
            status.innerText = "Запуск камеры...";
            
            scanner = new Html5Qrcode("reader");
            
            // КРИТИЧЕСКИЕ НАСТРОЙКИ СКОРОСТИ:
            const config = { 
                fps: 25, // Повышаем частоту кадров (было 15)
                qrbox: { width: 300, height: 150 }, // Прямоугольный прицел специально под длинные штрихкоды
                experimentalFeatures: { useBarCodeDetectorIfSupported: true } // Включает аппаратное ускорение смартфона
            };

            scanner.start(
                { facingMode: "environment" },
                config,
                (text) => {
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    status.innerText = "Код считан!";
                    tg.sendData(JSON.stringify({ barcode: text }));
                    setTimeout(() => tg.close(), 100);
                },
                (err) => {} // Игнорируем промахи фокуса
            ).then(() => {
                status.innerText = "Положите штрих-код в рамку прицела";
            }).catch(e => {
                status.innerText = "Ошибка камеры. Проверьте разрешения.";
                btn.style.display = 'inline-block';
            });
        });
    </script>
</body>
</html>
