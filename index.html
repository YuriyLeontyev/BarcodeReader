<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сканер ТСД</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1c1c1e;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        h2 { 
            margin-top: 20px; 
            font-size: 20px;
            font-weight: 600;
        }
        #reader-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        #reader {
            width: 92%;
            max-width: 450px;
            aspect-ratio: 4 / 3;
            border-radius: 16px;
            overflow: hidden;
            background-color: #000;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        /* Стилизация внутренних элементов библиотеки html5-qrcode */
        #reader video {
            object-fit: cover !important;
        }
        #reader__scan_region {
            background: rgba(255, 255, 255, 0.02);
        }
        .panel { 
            padding: 20px; 
            background: #2c2c2e; 
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.3);
        }
        .btn {
            background-color: #007aff; 
            color: white; 
            border: none;
            border-radius: 12px; 
            padding: 16px; 
            font-size: 16px;
            font-weight: 600; 
            width: 100%; 
            max-width: 300px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0,122,255,0.3);
            transition: background-color 0.2s;
        }
        .btn:active {
            background-color: #0056b3;
        }
        .status {
            margin-bottom: 12px; 
            color: #9a9a9f; 
            font-size: 15px;
        }
    </style>
</head>
<body>

    <h2>Сканирование товара</h2>
    
    <div id="reader-container">
        <div id="reader"></div>
    </div>
    
    <div class="panel">
        <div id="status" class="status">Нажмите кнопку для запуска</div>
        <button class="btn" id="action-btn">Включить камеру 📷</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем WebApp на весь экран телефона

        const btn = document.getElementById('action-btn');
        const statusDiv = document.getElementById('status');
        let scanner = null;

        btn.addEventListener('click', async () => {
            btn.style.display = 'none';
            statusDiv.innerText = "Запуск камеры...";
            
            // Если остался старый экземпляр сканера, очищаем его во избежание конфликтов потока
            if (scanner) {
                try {
                    await scanner.clear();
                } catch (e) {
                    console.log("Предыдущий сканер уже был очищен");
                }
            }
            
            // Инициализируем сканер в блоке <div id="reader">
            scanner = new Html5Qrcode("reader");
            
            // Конфигурация для быстрого захвата линейных штрихкодов товаров (EAN-13, и т.д.)
            const config = { 
                fps: 25, // Повышенная частота кадров для мгновенной обработки картинки
                qrbox: { width: 320, height: 160 }, // Прямоугольная рамка прицела под формат товарных штрихкодов
                experimentalFeatures: { useBarCodeDetectorIfSupported: true } // Аппаратное ускорение на поддерживаемых смартфонах
            };

            scanner.start(
                { facingMode: "environment" }, // Принудительно задействуем заднюю камеру
                config,
                (text) => {
                    // Коллбек: штрихкод успешно распознан!
                    
                    // Виброотклик смартфона (если поддерживается устройством)
                    if (tg.HapticFeedback) {
                        tg.HapticFeedback.notificationOccurred('success');
                    }
                    
                    statusDiv.innerText = "Код успешно считан!";
                    
                    // Отправляем JSON-пакет обратно в Telegram-бота
                    tg.sendData(JSON.stringify({ barcode: text }));
                    
                    // КРИТИЧЕСКОЕ ИСПРАВЛЕНИЕ: Гасим камеру и освобождаем видеопоток, 
                    // только после этого закрываем окно WebApp, чтобы избежать "зависаний" при повторном запуске.
                    scanner.stop().then(() => {
                        tg.close();
                    }).catch((err) => {
                        console.error("Ошибка при остановке камеры:", err);
                        tg.close();
                    });
                },
                (err) => {
                    // Игнорируем фоновые ошибки фокуса и пустые кадры, чтобы не засорять логи
                }
            ).then(() => {
                statusDiv.innerText = "Поместите штрих-код в рамку прицела";
            }).catch(e => {
                statusDiv.innerText = "Ошибка доступа. Проверьте разрешения камеры.";
                btn.style.display = 'inline-block';
                console.error("Ошибка старта html5-qrcode:", e);
            });
        });

        // Автоматический клик по кнопке при открытии страницы, 
        // чтобы сотруднику на ТСД не нужно было делать лишнее нажатие на экран
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                btn.click();
            }, 100);
        });
    </script>
</body>
</html>
